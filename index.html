<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WOW Technicade Maintenance Portal — Assets & Operations</title>
  <style>
    :root{--bg:#f4f6fb;--card:#ffffff;--line:#d8dee8;--text:#14202b;--muted:#607080;--accent:#0f172a;--accent-2:#1d4ed8;--soft:#eef3fb;--good:#0f766e;--warn:#b45309;--bad:#b91c1c}
    *{box-sizing:border-box} html,body{margin:0;padding:0} body{font-family:Inter,Arial,sans-serif;background:linear-gradient(180deg,#f7f9fc,#eef3fa);color:var(--text)}
    .wrap{max-width:1440px;margin:0 auto;padding:22px} .hero,.card,.item{background:var(--card);border:1px solid var(--line);border-radius:24px;box-shadow:0 8px 24px rgba(15,23,42,.05)}
    .hero{padding:26px;margin-bottom:18px} .hero h1{margin:8px 0 10px;font-size:clamp(28px,3.5vw,44px)} .hero p{margin:0;color:var(--muted)} .pill{display:inline-flex;gap:8px;align-items:center;border:1px solid var(--line);background:var(--soft);padding:8px 12px;border-radius:999px;font-size:12px;font-weight:600}
    .metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-top:18px} .metric{background:var(--soft);border:1px solid var(--line);padding:14px;border-radius:18px}.metric .v{font-size:26px;font-weight:800}
    .tabs{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:18px} .tab{padding:13px 14px;border-radius:16px;border:1px solid var(--line);background:#fff;cursor:pointer;font-weight:700}.tab.active{background:var(--accent);color:#fff}
    .section{display:none}.section.active{display:block}.grid{display:grid;gap:16px}.grid-2{grid-template-columns:1.2fr .8fr}.grid-3{grid-template-columns:repeat(3,1fr)}.grid-4{grid-template-columns:repeat(4,1fr)}@media(max-width:1100px){.grid-2,.grid-3,.grid-4{grid-template-columns:1fr}}
    .card{padding:18px}.item{padding:16px}.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}.space{justify-content:space-between}.stack{display:grid;gap:10px}
    .subtle{background:var(--soft);border:1px solid var(--line);border-radius:18px;padding:14px}.tiny{font-size:12px;color:var(--muted)}.mt{margin-top:12px}
    .badge{display:inline-flex;align-items:center;padding:6px 10px;border-radius:999px;border:1px solid var(--line);font-size:12px;background:var(--soft);font-weight:700}.good{background:#ecfeff;border-color:#a5f3fc;color:var(--good)}.warn{background:#fff7ed;border-color:#fed7aa;color:var(--warn)}.bad{background:#fef2f2;border-color:#fecaca;color:var(--bad)}
    input,select,textarea,button{font:inherit}input,select,textarea{width:100%;padding:10px 12px;border-radius:14px;border:1px solid var(--line)}textarea{min-height:90px}
    button.primary,.upload-label{background:var(--accent);color:#fff;border:1px solid var(--accent);padding:10px 12px;border-radius:14px;cursor:pointer}button.secondary{background:#fff;border:1px solid var(--line);padding:10px 12px;border-radius:14px;cursor:pointer}button.small{padding:7px 10px;border-radius:10px}
    .controls{display:grid;grid-template-columns:1.4fr repeat(5,minmax(120px,1fr));gap:10px}@media(max-width:1200px){.controls{grid-template-columns:1fr 1fr}}@media(max-width:700px){.controls{grid-template-columns:1fr}}
    .clickable{cursor:pointer;transition:all .15s}.clickable:hover{transform:translateY(-1px);box-shadow:0 6px 16px rgba(15,23,42,.12)}
    .history-item{background:#fff;border:1px solid var(--line);border-radius:14px;padding:12px}.hide{display:none}
    .modal{position:fixed;inset:0;background:rgba(15,23,42,.45);display:none;align-items:center;justify-content:center;padding:18px;z-index:10}.modal.show{display:flex}.modal-card{width:min(980px,100%);max-height:92vh;overflow:auto;background:#fff;border-radius:22px;border:1px solid var(--line);padding:18px}
    .chip{display:inline-flex;align-items:center;padding:5px 8px;border-radius:999px;background:var(--soft);border:1px solid var(--line);font-size:11px}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hero">
      <div class="pill">WOW Technicade · browser-local app (single HTML file)</div>
      <h1>Arcade assets, operations, docs, and accountability</h1>
      <p>Inventory + manuals are merged into Assets. Admin controls are password-gated locally in this browser only.</p>
      <div class="metrics" id="metrics"></div>
    </div>
    <div class="tabs" id="tabs"></div>
    <section id="dashboard" class="section active"></section>
    <section id="assets" class="section"></section>
    <section id="operations" class="section"></section>
    <section id="contacts" class="section"></section>
    <section id="reports" class="section"></section>
    <section id="admin" class="section"></section>
  </div>

  <div id="asset-modal" class="modal"><div class="modal-card" id="asset-modal-body"></div></div>

  <script>
    const TODAY = new Date().toISOString().slice(0,10);
    const STORAGE_KEYS = { assets:'wow_maintenance_assets', service:'wow_maintenance_serviceRecords', tasks:'wow_maintenance_oneOffTasks', handoff:'wow_maintenance_handoff', contacts:'wow_maintenance_contacts', workers:'wow_maintenance_workers', admin:'wow_maintenance_admin'};
    const TABS = ['dashboard','assets','operations','contacts','reports','admin'];
    const ROLES = ['Manager','Assistant','Lead','Staff'];
    const DOC_STATUSES = ['Manual linked','Family manual','Support linked','Missing'];
    const SEVERITY = ['Critical','High','Medium','Low'];
    const STATUS = ['Open','Scheduled','In Progress','Waiting Parts','Complete'];
    const defaultAssets = [{id:'asset-1',name:'StepManiaX',manufacturer:'Step Revolution',category:'Dance / Rhythm',quantity:1,documentation:{status:'Manual linked',manualUrl:'https://www.stepmaniax.com/docs/Software%20-%20Manual.pdf',supportUrl:'https://stepmaniax.com/support/',notes:'',lastUpdated:TODAY,statusNotes:''},pmFocus:'Pads, bar hardware, fan vents, stage sensors',notes:'',issues:[{id:'iss-1',text:'Pad sensor drift on player 2 corner',severity:'High',status:'Open',createdAt:TODAY}],urgency:'High',assignedWorkers:[],status:'Active',serviceHistory:[],operationHistory:[],photos:[]},{id:'asset-2',name:'Air Hockey Table',manufacturer:'ICE',category:'Sports',quantity:1,documentation:{status:'Family manual',manualUrl:'',supportUrl:'https://www.icegame.com/',notes:'Need exact revision PDF',lastUpdated:TODAY,statusNotes:'Family manual only'},pmFocus:'Blower output, puck wear, score sensors',notes:'',issues:[],urgency:'Medium',assignedWorkers:[],status:'Active',serviceHistory:[],operationHistory:[],photos:[]}];
    const defaultWorkers = [{id:'w1',name:'Alex',role:'Lead'},{id:'w2',name:'Jordan',role:'Staff'},{id:'w3',name:'Sam',role:'Assistant'},{id:'w4',name:'Manager',role:'Manager'}];
    const defaultContacts = [{manufacturer:'ICE',contact:'Support',phone:'',email:'',notes:'',website:'https://www.icegame.com/'}];

    const safeLoad=(k,f)=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):f}catch{return f}};
    const safeSave=(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v))}catch{}};
    const addDays=(d,n)=>{const x=new Date(d+'T12:00:00');x.setDate(x.getDate()+n);return x.toISOString().slice(0,10)};
    const esc=s=>String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
    const bClass=v=>['Critical','High'].includes(v)?'bad':['Medium','Scheduled','Waiting Parts','Family manual','Support linked'].includes(v)?'warn':'good';
    const byName=n=>assets.find(a=>a.name===n);

    let assets = safeLoad(STORAGE_KEYS.assets, null);
    let serviceRecords = safeLoad(STORAGE_KEYS.service, []);
    let oneOffTasks = safeLoad(STORAGE_KEYS.tasks, []);
    let handoffLog = safeLoad(STORAGE_KEYS.handoff, []);
    let contactsList = safeLoad(STORAGE_KEYS.contacts, defaultContacts);
    let workers = safeLoad(STORAGE_KEYS.workers, defaultWorkers);
    let adminState = safeLoad(STORAGE_KEYS.admin, {password:'',unlocked:false});

    function migrateData(){
      if(!Array.isArray(assets) || !assets.length){
        const oldGames=safeLoad('wow_maintenance_games', []);
        const source = oldGames.length?oldGames.map(g=>({name:g.title,manufacturer:g.manufacturer,category:g.category,quantity:g.qty,status:g.status,manual:g.manual,support:g.support,pm:g.pm,notes:g.notes||''})):defaultAssets;
        assets = source.map((g,i)=>({id:'asset-'+Date.now()+'-'+i,name:g.name,manufacturer:g.manufacturer||'',category:g.category||'',quantity:g.quantity||1,documentation:{status:g.status||'Missing',manualUrl:g.manual||'',supportUrl:g.support||'',notes:'',lastUpdated:TODAY,statusNotes:''},pmFocus:g.pm||'',notes:g.notes||'',issues:[],urgency:'Medium',assignedWorkers:[],status:'Active',serviceHistory:[],operationHistory:[],photos:[]}));
      }
      if(!workers.length){workers=defaultWorkers}
      const ensureWorker = n=>{if(!n||n==='Unassigned')return; if(!workers.find(w=>w.name===n)){workers.push({id:'w-'+Date.now()+Math.random(),name:n,role:'Staff'})}};
      serviceRecords = serviceRecords.map(r=>{ensureWorker(r.technician); const a=byName(r.title)||assets.find(x=>x.name===r.title); if(a){if(!a.assignedWorkers?.length&&r.technician&&r.technician!=='Unassigned') a.assignedWorkers=[r.technician]; if(r.issue&&(!a.issues||!a.issues.length)) a.issues=[{id:'mig-'+Date.now()+Math.random(),text:r.issue,severity:r.severity||'Medium',status:r.status||'Open',createdAt:r.lastUpdated||TODAY}]; a.operationHistory=[...(a.operationHistory||[]),...((r.history||[]).map(h=>({date:h.date||TODAY,summary:h.action||'Service update',status:r.status||'Open',workers:r.assignedWorkers||[r.technician].filter(Boolean)})))]; a.serviceHistory=[...(a.serviceHistory||[]),...(r.issueHistory||[]).map(h=>({date:h.date||TODAY,note:h.note||'',status:h.status||'',severity:h.severity||r.severity||'Medium'}))]; a.photos=[...(a.photos||[]),...(r.photos||[])]; }
        return {...r,assignedWorkers:r.assignedWorkers&&r.assignedWorkers.length?r.assignedWorkers:(r.technician&&r.technician!=='Unassigned'?[r.technician]:[])};
      });
      oneOffTasks = oneOffTasks.map(t=>{ensureWorker(t.technician); return {...t,assignedWorkers:t.assignedWorkers&&t.assignedWorkers.length?t.assignedWorkers:(t.technician&&t.technician!=='Unassigned'?[t.technician]:[])};});
      assets=assets.map(a=>({id:a.id||('asset-'+Date.now()+Math.random()),name:a.name||a.title||'Untitled Asset',manufacturer:a.manufacturer||'',category:a.category||'General',quantity:Number(a.quantity||a.qty||1),documentation:{status:a.documentation?.status||a.status||'Missing',manualUrl:a.documentation?.manualUrl||a.manual||'',supportUrl:a.documentation?.supportUrl||a.support||'',notes:a.documentation?.notes||'',lastUpdated:a.documentation?.lastUpdated||TODAY,statusNotes:a.documentation?.statusNotes||''},pmFocus:a.pmFocus||a.pm||'',notes:a.notes||'',issues:Array.isArray(a.issues)?a.issues:[],urgency:a.urgency||'Medium',assignedWorkers:Array.isArray(a.assignedWorkers)?a.assignedWorkers:[],status:a.status||'Active',serviceHistory:Array.isArray(a.serviceHistory)?a.serviceHistory:[],operationHistory:Array.isArray(a.operationHistory)?a.operationHistory:[],photos:Array.isArray(a.photos)?a.photos:[]}));
      saveAll();
    }

    function saveAll(){safeSave(STORAGE_KEYS.assets,assets);safeSave(STORAGE_KEYS.service,serviceRecords);safeSave(STORAGE_KEYS.tasks,oneOffTasks);safeSave(STORAGE_KEYS.handoff,handoffLog);safeSave(STORAGE_KEYS.contacts,contactsList);safeSave(STORAGE_KEYS.workers,workers);safeSave(STORAGE_KEYS.admin,adminState)}

    function activeOps(){return serviceRecords.filter(r=>r.status!=='Complete')}
    function recentCompleted(){return [...serviceRecords.filter(r=>r.status==='Complete').map(r=>({date:r.lastUpdated||TODAY,text:`${r.title}: PM complete`})),...oneOffTasks.filter(t=>t.status==='Complete').map(t=>({date:t.completedAt||t.dueDate||TODAY,text:`${t.machine||t.title}: ${t.title}`}))].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,8)}

    function renderTabs(){const el=tabs;el.innerHTML=TABS.map(t=>`<button class="tab ${t==='dashboard'?'active':''}" data-tab="${t}">${t}</button>`).join('');el.querySelectorAll('.tab').forEach(b=>b.onclick=()=>showTab(b.dataset.tab))}
    function showTab(tab){document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('active',b.dataset.tab===tab));document.querySelectorAll('.section').forEach(s=>s.classList.toggle('active',s.id===tab));}

    function renderMetrics(){
      const units=assets.reduce((n,a)=>n+a.quantity,0), open=activeOps().length, overdue=serviceRecords.filter(r=>r.status!=='Complete'&&r.nextPm&&r.nextPm<TODAY).length;
      metrics.innerHTML=[['Assets',assets.length,'Tracked records'],['Units',units,'Floor count'],['Open operations',open,'Active queue'],['Overdue PM',overdue,'Past next PM'],['Waiting Parts',serviceRecords.filter(r=>r.status==='Waiting Parts').length,'Blocked'],['Docs gaps',assets.filter(a=>!a.documentation.manualUrl||a.documentation.status==='Missing').length,'Action needed']].map(m=>`<div class="metric"><div class="tiny">${m[0]}</div><div class="v">${m[1]}</div><div class="tiny">${m[2]}</div></div>`).join('');
    }

    function dashboardCard(title,count,action,kind=''){return `<div class="subtle clickable" data-action="${action}" data-kind="${kind}"><strong>${title}</strong><div class="v" style="font-size:26px;margin-top:8px">${count}</div></div>`}
    function renderDashboard(){
      const open=activeOps(), overdue=open.filter(r=>r.nextPm&&r.nextPm<TODAY), waiting=open.filter(r=>r.status==='Waiting Parts'), unassigned=open.filter(r=>!r.assignedWorkers?.length), hi=open.filter(r=>['High','Critical'].includes(r.severity));
      const docs={manual:assets.filter(a=>a.documentation.status==='Manual linked').length,family:assets.filter(a=>a.documentation.status==='Family manual').length,support:assets.filter(a=>a.documentation.status==='Support linked').length,missing:assets.filter(a=>a.documentation.status==='Missing'||!a.documentation.manualUrl).length};
      const priority=[...open].sort((a,b)=>SEVERITY.indexOf(a.severity)-SEVERITY.indexOf(b.severity)).slice(0,8);
      const workerSummary=workers.map(w=>({w,ops:open.filter(o=>o.assignedWorkers?.includes(w.name)).length,tasks:oneOffTasks.filter(t=>t.status!=='Complete'&&t.assignedWorkers?.includes(w.name)).length}));
      dashboard.innerHTML=`
        <div class="grid grid-3">
          ${dashboardCard('Open operations',open.length,'operations')}
          ${dashboardCard('Overdue PM',overdue.length,'assets','overdue')}
          ${dashboardCard('Waiting Parts',waiting.length,'operations','waiting')}
          ${dashboardCard('Unassigned work',unassigned.length,'operations','unassigned')}
          ${dashboardCard('High/Critical urgency',hi.length,'assets','urgent')}
          ${dashboardCard('Recently completed',recentCompleted().length,'reports','recent')}
        </div>
        <div class="grid grid-2 mt">
          <div class="card"><div class="row space"><h2>Priority queue</h2><span class="tiny">Click to open asset detail</span></div>
            <div class="stack">${priority.map(r=>`<div class="history-item clickable" data-open-asset="${esc(r.title)}" data-highlight-op="${esc(r.id||r.title)}"><div class="row"><strong>${esc(r.title)}</strong><span class="badge ${bClass(r.severity)}">${r.severity}</span><span class="badge ${bClass(r.status)}">${r.status}</span></div><div class="tiny mt">Workers: ${(r.assignedWorkers||[]).join(', ')||'Unassigned'} · Next PM: ${r.nextPm||'—'}</div><div class="tiny mt">${esc(r.issue||'')}</div></div>`).join('')||'<div class="subtle tiny">No open operations.</div>'}</div>
          </div>
          <div class="card"><h2>Documentation status (clickable)</h2><div class="grid grid-2">
              <div class="subtle clickable" data-doc="Manual linked"><strong>Manual linked</strong><div class="tiny mt">${docs.manual}</div></div>
              <div class="subtle clickable" data-doc="Family manual"><strong>Family manual</strong><div class="tiny mt">${docs.family}</div></div>
              <div class="subtle clickable" data-doc="Support linked"><strong>Support linked</strong><div class="tiny mt">${docs.support}</div></div>
              <div class="subtle clickable" data-doc="Missing"><strong>Missing / gaps</strong><div class="tiny mt">${docs.missing}</div></div>
          </div></div>
        </div>
        <div class="grid grid-2 mt">
          <div class="card"><h2>Operations command view (live)</h2><div class="stack">${open.slice(0,10).map(o=>`<div class="history-item clickable" data-open-asset="${esc(o.title)}"><div class="row"><strong>${esc(o.title)}</strong><span class="badge ${bClass(o.severity)}">${o.severity}</span><span class="badge ${bClass(o.status)}">${o.status}</span></div><div class="tiny mt">Issue: ${esc(o.issue||'—')} · PM due ${o.nextPm||'—'} · Workers ${(o.assignedWorkers||[]).join(', ')||'Unassigned'}</div></div>`).join('')||'<div class="subtle tiny">No active operations.</div>'}</div></div>
          <div class="card"><h2>Worker workload summary</h2><div class="stack">${workerSummary.map(x=>`<div class="subtle"><div class="row space"><strong>${esc(x.w.name)}</strong><span class="chip">${x.w.role}</span></div><div class="tiny mt">Open operations: ${x.ops} · Open tasks: ${x.tasks}</div></div>`).join('')}</div></div>
        </div>`;
      dashboard.querySelectorAll('[data-action="operations"]').forEach(c=>c.onclick=()=>showTab('operations'));
      dashboard.querySelector('[data-kind="overdue"]')?.addEventListener('click',()=>{showTab('assets');setAssetFilter('overdue')});
      dashboard.querySelector('[data-kind="urgent"]')?.addEventListener('click',()=>{showTab('assets');setAssetFilter('urgent')});
      dashboard.querySelectorAll('[data-doc]').forEach(d=>d.onclick=()=>{showTab('assets');assetFilter.doc=d.dataset.doc;renderAssets()});
      dashboard.querySelectorAll('[data-open-asset]').forEach(n=>n.onclick=()=>openAssetDetail(n.dataset.openAsset,n.dataset.highlightOp));
    }

    const assetFilter={text:'',doc:'',urgency:'',worker:'',category:'',issue:''};
    function setAssetFilter(kind){if(kind==='overdue'){assetFilter.issue='overdue'}if(kind==='urgent'){assetFilter.urgency='High'}renderAssets()}
    function filteredAssets(){return assets.filter(a=>{
      const rec=serviceRecords.find(r=>r.title===a.name)||{};
      const hasOpenIssue=(a.issues||[]).some(i=>i.status!=='Resolved') || (rec.status && rec.status!=='Complete');
      const overdue=rec.nextPm&&rec.status!=='Complete'&&rec.nextPm<TODAY;
      return (!assetFilter.text || (a.name+a.manufacturer+a.category).toLowerCase().includes(assetFilter.text.toLowerCase())) && (!assetFilter.doc || a.documentation.status===assetFilter.doc || (assetFilter.doc==='Missing' && (!a.documentation.manualUrl||a.documentation.status==='Missing'))) && (!assetFilter.urgency || a.urgency===assetFilter.urgency || (assetFilter.urgency==='High'&&['High','Critical'].includes(a.urgency))) && (!assetFilter.worker || a.assignedWorkers.includes(assetFilter.worker)) && (!assetFilter.category || a.category===assetFilter.category) && (!assetFilter.issue || (assetFilter.issue==='open'?hasOpenIssue:assetFilter.issue==='overdue'?overdue:true));
    })}

    function renderAssets(){
      const cats=[...new Set(assets.map(a=>a.category))].sort();
      const list=filteredAssets();
      assetsSec.innerHTML=`<div class="card"><div class="row space"><h2>Assets</h2><div class="tiny">All asset cards are clickable</div></div>
        <div class="controls"><input id="f-text" placeholder="Search assets" value="${esc(assetFilter.text)}"><select id="f-doc"><option value="">Documentation status</option>${DOC_STATUSES.map(s=>`<option ${assetFilter.doc===s?'selected':''}>${s}</option>`).join('')}</select><select id="f-urg"><option value="">Urgency</option>${SEVERITY.map(s=>`<option ${assetFilter.urgency===s?'selected':''}>${s}</option>`).join('')}</select><select id="f-worker"><option value="">Assigned worker</option>${workers.map(w=>`<option ${assetFilter.worker===w.name?'selected':''}>${esc(w.name)}</option>`).join('')}</select><select id="f-cat"><option value="">Category</option>${cats.map(c=>`<option ${assetFilter.category===c?'selected':''}>${esc(c)}</option>`).join('')}</select><select id="f-issue"><option value="">Issue status</option><option value="open" ${assetFilter.issue==='open'?'selected':''}>Has active issue</option><option value="overdue" ${assetFilter.issue==='overdue'?'selected':''}>Overdue PM</option></select></div>
        <div class="stack mt">${list.map(a=>`<div class="item clickable" data-asset="${esc(a.name)}"><div class="row space"><strong>${esc(a.name)}</strong><div class="row"><span class="badge ${bClass(a.urgency)}">${a.urgency}</span><span class="badge ${bClass(a.documentation.status)}">${a.documentation.status}</span></div></div><div class="tiny mt">${esc(a.manufacturer)} · ${esc(a.category)} · Qty ${a.quantity}</div><div class="tiny mt">Workers: ${(a.assignedWorkers||[]).join(', ')||'Unassigned'}</div></div>`).join('')||'<div class="subtle tiny">No matching assets.</div>'}</div></div>`;
      [['f-text','text'],['f-doc','doc'],['f-urg','urgency'],['f-worker','worker'],['f-cat','category'],['f-issue','issue']].forEach(([id,key])=>assetsSec.querySelector('#'+id).oninput=e=>{assetFilter[key]=e.target.value;renderAssets()});
      assetsSec.querySelectorAll('[data-asset]').forEach(c=>c.onclick=()=>openAssetDetail(c.dataset.asset));
    }

    function renderOperations(){
      const active=serviceRecords.filter(r=>r.status!=='Complete');
      operations.innerHTML=`<div class="card"><div class="row space"><h2>Operations (active by default)</h2><button class="secondary small" id="show-complete">Toggle completed (${serviceRecords.filter(r=>r.status==='Complete').length})</button></div><div class="stack" id="op-list">${active.map(r=>`<div class="history-item"><div class="row space"><div><strong>${esc(r.title)}</strong><div class="tiny mt">${esc(r.issue||'')}</div></div><div class="row"><span class="badge ${bClass(r.severity)}">${r.severity}</span><select data-op-status="${esc(r.title)}">${STATUS.map(s=>`<option ${r.status===s?'selected':''}>${s}</option>`).join('')}</select></div></div><div class="tiny mt">Workers: ${(r.assignedWorkers||[]).join(', ')||'Unassigned'} · Next PM: ${r.nextPm||'—'}</div><button class="primary small mt" data-op-open="${esc(r.title)}">Open asset detail</button></div>`).join('')||'<div class="subtle tiny">No active operations.</div>'}</div></div>`;
      operations.querySelectorAll('[data-op-open]').forEach(b=>b.onclick=()=>openAssetDetail(b.dataset.opOpen,b.dataset.opOpen));
      operations.querySelectorAll('[data-op-status]').forEach(s=>s.onchange=()=>{
        const r=serviceRecords.find(x=>x.title===s.dataset.opStatus); if(!r) return; r.status=s.value; r.lastUpdated=TODAY;
        const a=byName(r.title); if(a){a.operationHistory.unshift({date:TODAY,summary:`Operation status set to ${r.status}`,status:r.status,workers:r.assignedWorkers||[]}); if(r.status==='Complete'){a.serviceHistory.unshift({date:TODAY,note:'Operation completed and logged from Operations tab.',status:'Complete',severity:r.severity});}}
        if(r.status==='Complete'){r.lastService=TODAY; r.nextPm=addDays(TODAY,14)}
        saveAll(); renderAll();
      });
      operations.querySelector('#show-complete').onclick=()=>{const done=serviceRecords.filter(r=>r.status==='Complete').map(r=>`<div class='history-item'><strong>${esc(r.title)}</strong><div class='tiny mt'>Completed ${r.lastUpdated||'—'}</div></div>`).join('')||'<div class="subtle tiny">No completed operations.</div>'; operations.querySelector('#op-list').innerHTML+=`<h3>Completed operations</h3>${done}`};
    }

    function workerChecks(selected=[]){return workers.map(w=>`<label class='row'><input type='checkbox' value='${esc(w.name)}' ${selected.includes(w.name)?'checked':''} style='width:auto'>${esc(w.name)} <span class='chip'>${w.role}</span></label>`).join('')}
    function openAssetDetail(name,highlight=''){
      const a=assets.find(x=>x.name===name); if(!a) return;
      const rec=serviceRecords.find(r=>r.title===a.name);
      assetModalBody.innerHTML=`<div class='row space'><h2>${esc(a.name)}</h2><button class='secondary small' id='close-asset'>Close</button></div>
      <div class='grid grid-2'>
        <div class='card'><h3>Asset details</h3><div class='stack'>
          <input id='d-name' value='${esc(a.name)}'><input id='d-man' value='${esc(a.manufacturer)}'><input id='d-cat' value='${esc(a.category)}'><input id='d-qty' type='number' min='1' value='${a.quantity}'>
          <select id='d-doc'>${DOC_STATUSES.map(s=>`<option ${a.documentation.status===s?'selected':''}>${s}</option>`).join('')}</select><input id='d-manual' placeholder='Manual URL' value='${esc(a.documentation.manualUrl)}'><input id='d-support' placeholder='Support URL' value='${esc(a.documentation.supportUrl)}'>
          <input id='d-pm' value='${esc(a.pmFocus)}' placeholder='PM focus'><select id='d-urg'>${SEVERITY.map(s=>`<option ${a.urgency===s?'selected':''}>${s}</option>`).join('')}</select><input id='d-status' value='${esc(a.status)}'><textarea id='d-notes'>${esc(a.notes)}</textarea>
          <textarea id='d-doc-notes' placeholder='Missing docs notes / status notes'>${esc(a.documentation.notes||a.documentation.statusNotes||'')}</textarea>
          <div><strong>Assigned workers</strong>${workerChecks(a.assignedWorkers)}</div>
          <button class='primary' id='save-asset'>Save asset changes</button>
        </div></div>
        <div class='card'><h3>Issues & history</h3>
          <div class='stack'>${(a.issues||[]).map(i=>`<div class='history-item ${highlight&&highlight.includes(i.id)?'bad':''}'><strong>${esc(i.text)}</strong><div class='tiny mt'>${i.severity} · ${i.status}</div></div>`).join('')||'<div class="subtle tiny">No issues yet.</div>'}
          <textarea id='new-issue' placeholder='Add/update issue'></textarea><select id='new-issue-sev'>${SEVERITY.map(s=>`<option>${s}</option>`).join('')}</select><button class='secondary small' id='add-issue'>Add issue</button>
          <textarea id='new-note' placeholder='Add service note'></textarea><button class='secondary small' id='add-note'>Add note</button>
          <div class='subtle tiny'>Documentation update: ${a.documentation.lastUpdated||'—'}<br>Manual: ${a.documentation.manualUrl?`<a href='${esc(a.documentation.manualUrl)}' target='_blank'>link</a>`:'None'} · Support: ${a.documentation.supportUrl?`<a href='${esc(a.documentation.supportUrl)}' target='_blank'>link</a>`:'None'}</div>
          <div class='tiny'>Operation history</div>${(a.operationHistory||[]).slice(0,8).map(h=>`<div class='history-item'><div>${esc(h.summary||h.status||'Update')}</div><div class='tiny'>${h.date}</div></div>`).join('')||'<div class="subtle tiny">No operation history.</div>'}
          <div class='tiny'>Service history</div>${(a.serviceHistory||[]).slice(0,8).map(h=>`<div class='history-item'><div>${esc(h.note||h.action||'Service')}</div><div class='tiny'>${h.date}</div></div>`).join('')||'<div class="subtle tiny">No service history.</div>'}
          </div>
        </div>
      </div>`;
      document.getElementById('close-asset').onclick=()=>assetModal.classList.remove('show');
      document.getElementById('save-asset').onclick=()=>{
        const old=a.name; a.name=dName.value.trim(); a.manufacturer=dMan.value.trim(); a.category=dCat.value.trim(); a.quantity=Number(dQty.value||1); a.documentation.status=dDoc.value; a.documentation.manualUrl=dManual.value.trim(); a.documentation.supportUrl=dSupport.value.trim(); a.documentation.notes=dDocNotes.value.trim(); a.documentation.lastUpdated=TODAY; a.pmFocus=dPm.value.trim(); a.urgency=dUrg.value; a.status=dStatus.value.trim(); a.notes=dNotes.value.trim();
        a.assignedWorkers=[...assetModalBody.querySelectorAll('input[type="checkbox"]:checked')].map(c=>c.value);
        const rec=serviceRecords.find(r=>r.title===old); if(rec){rec.title=a.name; rec.assignedWorkers=[...a.assignedWorkers]; rec.technician=a.assignedWorkers[0]||'Unassigned'; rec.severity=a.urgency; rec.issue=(a.issues[0]?.text||rec.issue);} 
        oneOffTasks.filter(t=>t.machine===old).forEach(t=>t.machine=a.name); saveAll(); renderAll(); assetModal.classList.remove('show');
      };
      document.getElementById('add-issue').onclick=()=>{const text=document.getElementById('new-issue').value.trim(); if(!text) return; a.issues.unshift({id:'iss-'+Date.now(),text,severity:document.getElementById('new-issue-sev').value,status:'Open',createdAt:TODAY}); a.urgency=document.getElementById('new-issue-sev').value; saveAll(); openAssetDetail(a.name); renderAll();};
      document.getElementById('add-note').onclick=()=>{const note=document.getElementById('new-note').value.trim(); if(!note) return; a.serviceHistory.unshift({date:TODAY,note,status:'Note',severity:a.urgency}); saveAll(); openAssetDetail(a.name);};
      assetModal.classList.add('show');
      const dName=document.getElementById('d-name'),dMan=document.getElementById('d-man'),dCat=document.getElementById('d-cat'),dQty=document.getElementById('d-qty'),dDoc=document.getElementById('d-doc'),dManual=document.getElementById('d-manual'),dSupport=document.getElementById('d-support'),dPm=document.getElementById('d-pm'),dUrg=document.getElementById('d-urg'),dStatus=document.getElementById('d-status'),dNotes=document.getElementById('d-notes'),dDocNotes=document.getElementById('d-doc-notes');
    }

    function renderContacts(){contactsSec.innerHTML=`<div class='card'><h2>Contacts</h2><div class='stack'>${contactsList.map(c=>`<div class='subtle'><strong>${esc(c.manufacturer)}</strong><div class='tiny mt'>${esc(c.contact)} · ${esc(c.website||'')}</div></div>`).join('')}</div></div>`}

    function exportCsv(name,headers,rows){const escv=v=>`"${String(v??'').replace(/"/g,'""')}"`;const csv=[headers,...rows].map(r=>r.map(escv).join(',')).join('\n');const blob=new Blob([csv],{type:'text/csv'});const u=URL.createObjectURL(blob);const a=document.createElement('a');a.href=u;a.download=name;a.click();URL.revokeObjectURL(u)}
    function renderReports(){reports.innerHTML=`<div class='grid grid-2'><div class='card'><h2>Recent completion</h2><div class='stack'>${recentCompleted().map(x=>`<div class='history-item'><strong>${esc(x.text)}</strong><div class='tiny mt'>${x.date}</div></div>`).join('')||'<div class="subtle tiny">No completed entries.</div>'}</div></div><div class='card'><h2>Exports</h2><div class='row'><button class='secondary' id='exp-maint'>Assets maintenance CSV</button><button class='secondary' id='exp-task'>Operations task CSV</button></div><div class='tiny mt'>CSV behavior retained, wording now uses Assets.</div></div></div>`;reports.querySelector('#exp-maint').onclick=()=>exportCsv('assets-maintenance.csv',['Asset','Manufacturer','Category','Qty','Documentation Status','Urgency','Assigned Workers','Operation Status','Issue','Manual URL','Support URL'],serviceRecords.map(r=>{const a=byName(r.title)||{};return[r.title,a.manufacturer||'',a.category||'',a.quantity||'',a.documentation?.status||'',r.severity||a.urgency||'',(r.assignedWorkers||[]).join(' | '),r.status||'',r.issue||'',a.documentation?.manualUrl||'',a.documentation?.supportUrl||'']}));reports.querySelector('#exp-task').onclick=()=>exportCsv('operations-tasks.csv',['Task','Machine','Status','Severity','Workers','Due Date','Notes'],oneOffTasks.map(t=>[t.title,t.machine,t.status,t.severity,(t.assignedWorkers||[]).join(' | '),t.dueDate,t.notes]))}

    function renderAdmin(){
      const locked=!adminState.password||!adminState.unlocked;
      admin.innerHTML=`<div class='card'><div class='row space'><h2>Admin (browser-local protection only)</h2><span class='tiny'>Client-side lock</span></div>${locked?`<div class='stack'><input id='admin-pass' type='password' placeholder='${adminState.password?'Enter admin password':'Create admin password on first use'}'><button class='primary' id='admin-unlock'>${adminState.password?'Unlock':'Create password & unlock'}</button></div>`:`<div class='grid grid-2'><div class='card'><h3>Worker management</h3><div class='stack' id='workers-list'>${workers.map(w=>`<div class='history-item'><div class='row space'><input data-worker-name='${w.id}' value='${esc(w.name)}'><select data-worker-role='${w.id}'>${ROLES.map(r=>`<option ${w.role===r?'selected':''}>${r}</option>`).join('')}</select><button class='secondary small' data-worker-del='${w.id}'>Remove</button></div></div>`).join('')}<button class='secondary small' id='add-worker'>Add worker</button><button class='primary small' id='save-workers'>Save workers</button></div></div><div class='card'><h3>Add Asset</h3><div class='stack'><input id='new-asset-name' placeholder='Asset name'><input id='new-asset-man' placeholder='Manufacturer'><input id='new-asset-cat' placeholder='Category'><input id='new-asset-qty' type='number' value='1' min='1'><select id='new-asset-doc'>${DOC_STATUSES.map(s=>`<option>${s}</option>`).join('')}</select><input id='new-asset-manual' placeholder='Manual URL'><input id='new-asset-support' placeholder='Support URL'><input id='new-asset-pm' placeholder='PM focus'><input id='new-asset-status' placeholder='Status' value='Active'><select id='new-asset-urg'>${SEVERITY.map(s=>`<option>${s}</option>`).join('')}</select><textarea id='new-asset-notes' placeholder='Notes'></textarea><div><strong>Assigned workers</strong>${workerChecks([])}</div><button class='primary' id='create-asset'>Create asset</button></div></div></div><div class='card mt'><h3>Backup / restore (admin only)</h3><div class='row'><button class='secondary' id='exp-json'>Export JSON backup</button><label class='upload-label'>Import JSON<input id='imp-json' class='hide' type='file' accept='application/json'></label><button class='secondary' id='lock-admin'>Lock admin</button></div></div>`}</div>`;
      if(locked){admin.querySelector('#admin-unlock').onclick=()=>{const p=admin.querySelector('#admin-pass').value; if(!p)return; if(!adminState.password) adminState.password=p; if(p===adminState.password){adminState.unlocked=true;saveAll();renderAdmin()} else alert('Incorrect password');};return;}
      admin.querySelector('#lock-admin').onclick=()=>{adminState.unlocked=false;saveAll();renderAdmin()};
      admin.querySelector('#add-worker').onclick=()=>{workers.push({id:'w-'+Date.now(),name:'New Worker',role:'Staff'});renderAdmin()};
      admin.querySelectorAll('[data-worker-del]').forEach(b=>b.onclick=()=>{workers=workers.filter(w=>w.id!==b.dataset.workerDel);renderAdmin()});
      admin.querySelector('#save-workers').onclick=()=>{workers=workers.map(w=>({id:w.id,name:admin.querySelector(`[data-worker-name="${w.id}"]`).value.trim()||'Unnamed',role:admin.querySelector(`[data-worker-role="${w.id}"]`).value})); saveAll(); renderAll();};
      admin.querySelector('#create-asset').onclick=()=>{const name=admin.querySelector('#new-asset-name').value.trim(); if(!name)return; const rec={id:'asset-'+Date.now(),name,manufacturer:admin.querySelector('#new-asset-man').value.trim(),category:admin.querySelector('#new-asset-cat').value.trim(),quantity:Number(admin.querySelector('#new-asset-qty').value||1),documentation:{status:admin.querySelector('#new-asset-doc').value,manualUrl:admin.querySelector('#new-asset-manual').value.trim(),supportUrl:admin.querySelector('#new-asset-support').value.trim(),notes:'',lastUpdated:TODAY,statusNotes:''},pmFocus:admin.querySelector('#new-asset-pm').value.trim(),notes:admin.querySelector('#new-asset-notes').value.trim(),issues:[],urgency:admin.querySelector('#new-asset-urg').value,assignedWorkers:[...admin.querySelectorAll('input[type="checkbox"]:checked')].map(c=>c.value),status:admin.querySelector('#new-asset-status').value.trim(),serviceHistory:[],operationHistory:[],photos:[]}; assets.unshift(rec); serviceRecords.unshift({id:'svc-'+Date.now(),title:name,technician:rec.assignedWorkers[0]||'Unassigned',assignedWorkers:[...rec.assignedWorkers],status:'Scheduled',priority:'Routine',severity:rec.urgency,lastService:'',nextPm:addDays(TODAY,14),issue:'New asset setup',notes:rec.pmFocus,partsNeeded:'',photos:[],verifiedBy:'',accountability:'',lastUpdated:TODAY,issueHistory:[],history:[]}); saveAll(); renderAll(); showTab('assets');};
      admin.querySelector('#exp-json').onclick=()=>{const payload={assets,serviceRecords,oneOffTasks,handoffLog,contacts:contactsList,workers,adminState};const blob=new Blob([JSON.stringify(payload,null,2)],{type:'application/json'});const u=URL.createObjectURL(blob);const a=document.createElement('a');a.href=u;a.download='wow-maintenance-backup.json';a.click();URL.revokeObjectURL(u)};
      admin.querySelector('#imp-json').onchange=(e)=>{const f=e.target.files?.[0];if(!f)return;const r=new FileReader();r.onload=()=>{try{const d=JSON.parse(r.result);assets=d.assets||assets;serviceRecords=d.serviceRecords||serviceRecords;oneOffTasks=d.oneOffTasks||oneOffTasks;handoffLog=d.handoffLog||handoffLog;contactsList=d.contacts||contactsList;workers=d.workers||workers;saveAll();renderAll();alert('Backup imported')}catch{alert('Could not import backup')}};r.readAsText(f)};
    }

    function renderAll(){renderTabs();renderMetrics();renderDashboard();renderAssets();renderOperations();renderContacts();renderReports();renderAdmin();}
    const tabs=document.getElementById('tabs'), metrics=document.getElementById('metrics'), dashboard=document.getElementById('dashboard'), assetsSec=document.getElementById('assets'), operations=document.getElementById('operations'), contactsSec=document.getElementById('contacts'), reports=document.getElementById('reports'), admin=document.getElementById('admin'), assetModal=document.getElementById('asset-modal'), assetModalBody=document.getElementById('asset-modal-body');
    migrateData();renderAll();assetModal.onclick=e=>{if(e.target===assetModal)assetModal.classList.remove('show')};
  </script>
</body>
</html>
